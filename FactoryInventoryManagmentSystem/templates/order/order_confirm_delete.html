<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Delete Order</title>
  <style>
    body{font-family:Segoe UI,Tahoma; background:#f5f7fa; padding:40px;}
    .box{max-width:600px;margin:auto;background:#fff;padding:25px;border-radius:12px;
      box-shadow:0 6px 16px rgba(0,0,0,0.08);}
    .title{font-size:22px;font-weight:700;margin-bottom:10px;color:#1e293b;}
    .desc{color:#475569;margin-bottom:20px;}
    .actions{display:flex; gap:12px; justify-content:flex-end;}
    .btn{padding:10px 18px;border-radius:8px;border:none;cursor:pointer;font-weight:600;text-decoration:none;}
    .btn-cancel{background:#e2e8f0;color:#334155;}
    .btn-delete{background:#ef4444;color:#fff;}
    .btn-delete:hover{background:#dc2626;}
  </style>
</head>
<body>
  <div class="box">
    <div class="title">Delete Order #{{ order.ord_id }}</div>
    <div class="desc">
      Are you sure you want to delete this order?
      <br><br>
      <b>Customer:</b> {{ order.cust_name }} <br>
      <b>Product:</b> {{ order.product }} <br>
      <b>Total Qty:</b> {{ order.total_quantity }}
    </div>

    <form method="POST">
      {% csrf_token %}
      <div class="actions">
        <a class="btn btn-cancel" href="{% url 'order_home' %}">Cancel</a>
        <button class="btn btn-delete" type="submit">Yes, Delete</button>
      </div>
    </form>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Update Order</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body{background:#f5f7fa;font-family:Segoe UI,Tahoma,Verdana,sans-serif}
    .container{max-width:900px;margin:40px auto;padding:0 20px}
    .card{background:#fff;border-radius:12px;padding:25px;box-shadow:0 4px 12px rgba(0,0,0,.06)}
    .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
    .title{font-size:22px;font-weight:700;color:#1e293b}
    .btn{padding:10px 18px;border-radius:8px;border:none;cursor:pointer;font-weight:600;display:inline-flex;align-items:center;text-decoration:none}
    .btn i{margin-right:8px}
    .btn-primary{background:#3b82f6;color:#fff}
    .btn-primary:hover{background:#2563eb}
    .btn-secondary{background:#e2e8f0;color:#334155}
    .btn-secondary:hover{background:#cbd5e1}
    form p{margin-bottom:14px}
    label{display:block;font-weight:600;color:#475569;margin-bottom:6px}
    input,select,textarea{width:100%;padding:12px 14px;border:1px solid #e2e8f0;border-radius:8px;font-size:14px;background:#fff}
    .actions{display:flex;gap:12px;justify-content:flex-end;margin-top:20px;padding-top:15px;border-top:1px solid #f1f5f9}
  </style>
</head>
<body>
  <div class="container">
    <div class="card">

      <div class="header">
        <div class="title"><i class="fas fa-pen"></i> Update Order #{{ order.ord_id }}</div>
        <a class="btn btn-secondary" href="{% url 'order_home' %}">
          <i class="fas fa-arrow-left"></i> Back
        </a>
      </div>

      <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}

        <div class="actions">
          <a class="btn btn-secondary" href="{% url 'order_home' %}">Cancel</a>
          <button class="btn btn-primary" type="submit">
            <i class="fas fa-save"></i> Update Order
          </button>
        </div>
      </form>

    </div>
  </div>
</body>
</html>

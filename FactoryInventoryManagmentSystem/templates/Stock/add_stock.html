<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Stock - Inventory Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
            --text-color: #ffffff;
            --muted-text: rgba(255, 255, 255, 0.75);

            --input-bg: rgba(255, 255, 255, 0.06);
            --input-border: rgba(255, 255, 255, 0.12);
            --input-focus: #66e3ff;

            --add-gradient: linear-gradient(90deg, #00c853, #00e676);
            --remove-gradient: linear-gradient(90deg, #ff416c, #ff1744);
            --update-gradient: linear-gradient(90deg, #00c6ff, #0072ff);

            --shadow-dark: rgba(0, 0, 0, 0.35);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #1f1c2c);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            overflow-x: hidden;
            position: relative;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .bg-circle {
            position: absolute;
            border-radius: 50%;
            filter: blur(90px);
            z-index: 0;
            opacity: 0.35;
        }

        .circle-1 {
            width: 260px;
            height: 260px;
            background: #7c4dff;
            top: 8%;
            left: 8%;
        }

        .circle-2 {
            width: 320px;
            height: 320px;
            background: #2979ff;
            bottom: 8%;
            right: 8%;
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 520px;
            padding: 36px;
            border-radius: 28px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            box-shadow: 0 24px 50px var(--shadow-dark);
            color: var(--text-color);
        }

        h2 {
            text-align: center;
            margin-bottom: 8px;
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .subtitle {
            text-align: center;
            color: var(--muted-text);
            font-size: 0.95rem;
            margin-bottom: 28px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--muted-text);
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        select,
        input[type="number"] {
            width: 100%;
            padding: 14px 16px;
            border-radius: 14px;
            border: 1px solid var(--input-border);
            background: var(--input-bg);
            color: white;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        select option {
            background: #2f2858;
            color: white;
        }

        select:focus,
        input[type="number"]:focus {
            border-color: var(--input-focus);
            box-shadow: 0 0 0 4px rgba(102, 227, 255, 0.12);
            background: rgba(255, 255, 255, 0.10);
        }

        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            opacity: 1;
        }

        .grid-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px;
            margin-bottom: 8px;
        }

        .input-card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 14px;
            border-radius: 18px;
        }

        .input-card label {
            margin-bottom: 10px;
        }

        .action-info {
            margin: 16px 0 12px;
            padding: 12px 14px;
            border-left: 4px solid #66e3ff;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            color: var(--muted-text);
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-top: 22px;
        }

        .btn {
            width: 100%;
            padding: 15px 18px;
            border: none;
            border-radius: 14px;
            color: white;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 0.8px;
            cursor: pointer;
            transition: all 0.25s ease;
            text-transform: uppercase;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.22);
        }

        .btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.06);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-add {
            background: var(--add-gradient);
        }

        .btn-remove {
            background: var(--remove-gradient);
        }

        .btn-update {
            background: var(--update-gradient);
        }

        @media (max-width: 520px) {
            .container {
                padding: 24px;
            }

            .grid-inputs {
                grid-template-columns: 1fr;
            }

            h2 {
                font-size: 1.7rem;
            }
        }
    </style>
</head>
<body>

    <div class="bg-circle circle-1"></div>
    <div class="bg-circle circle-2"></div>

    <div class="container">
        <h2>Manage Stock</h2>
        <p class="subtitle">Add, remove, or directly update product inventory</p>

        <form method="POST">
            {% csrf_token %}

            <div class="form-group">
                <label for="product">Product Type</label>
                <select name="product" id="product" required>
                    <option value="">Select Product</option>
                    {% for product in products %}
                        <option value="{{ product.pro_id }}">{{ product.pro_name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="grid-inputs">
                <div class="input-card">
                    <label for="pre_quantity">Premium</label>
                    <input type="number" id="pre_quantity" name="pre_quantity" min="0" value="0">
                </div>

                <div class="input-card">
                    <label for="std_quantity">Standard</label>
                    <input type="number" id="std_quantity" name="std_quantity" min="0" value="0">
                </div>

                <div class="input-card">
                    <label for="com_quantity">Commercial</label>
                    <input type="number" id="com_quantity" name="com_quantity" min="0" value="0">
                </div>

                <div class="input-card">
                    <label for="eco_quantity">Eco</label>
                    <input type="number" id="eco_quantity" name="eco_quantity" min="0" value="0">
                </div>
            </div>

            <div class="action-info">
                <strong>Add:</strong> increases stock<br>
                <strong>Remove:</strong> decreases stock<br>
                <strong>Update:</strong> replaces stock with exact values
            </div>

            <div class="button-group">
                <button type="submit" name="action" value="add" class="btn btn-add">
                    Add to Inventory
                </button>

                <button type="submit" name="action" value="remove" class="btn btn-remove">
                    Remove from Inventory
                </button>

                <button type="submit" name="action" value="update" class="btn btn-update">
                    Update Inventory
                </button>
            </div>
        </form>
    </div>
</body>
</html>
